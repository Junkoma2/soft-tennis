<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3Dフォームラボ | ソフトテニス</title>
  <meta name="description" content="ソフトテニスの3Dキャラクターとフォームを単体で確認する開発用ビューア。" />
  <link rel="stylesheet" href="model-viewer.css" />
</head>
<body>
  <main class="lab-shell">
    <header class="lab-header">
      <div>
        <p class="eyebrow">SOFT TENNIS / FORM LAB</p>
        <h1>3Dフォームラボ</h1>
        <p class="intro">ゲーム進行から切り離して、キャラクターの姿勢とスイングだけを確認できます。</p>
      </div>
      <a class="back-link" href="./?render=3d">コートへ戻る</a>
    </header>

    <div class="workspace">
      <section class="stage-card" aria-label="3Dモデル表示">
        <canvas id="viewer-canvas"></canvas>
        <div class="stage-labels" aria-hidden="true">
          <span id="role-badge">後衛</span>
          <strong id="motion-label">構え</strong>
        </div>
        <p class="drag-hint">ドラッグで回転 ・ ホイールで拡大</p>
        <div class="view-buttons" aria-label="視点">
          <button type="button" data-view="front" class="is-active">正面</button>
          <button type="button" data-view="side">横</button>
          <button type="button" data-view="back">背面</button>
        </div>
      </section>

      <aside class="control-card">
        <div class="control-heading">
          <span>CONTROL DESK</span>
          <strong id="play-state">再生中</strong>
        </div>

        <label class="field">
          <span>モデル</span>
          <select id="model-select">
            <option value="blue">プレイヤー・ブルー</option>
            <option value="orange">ライバル・オレンジ</option>
            <option value="mint">トレーニング・ミント</option>
          </select>
        </label>

        <fieldset class="field">
          <legend>ポジション</legend>
          <div class="segmented">
            <label><input type="radio" name="role" value="rear" checked /><span>後衛</span></label>
            <label><input type="radio" name="role" value="front" /><span>前衛</span></label>
          </div>
        </fieldset>

        <label class="field">
          <span>状況・フォーム</span>
          <select id="motion-select"></select>
        </label>

        <fieldset class="field">
          <legend>利き腕</legend>
          <div class="segmented">
            <label><input type="radio" name="handed" value="right" checked /><span>右利き</span></label>
            <label><input type="radio" name="handed" value="left" /><span>左利き</span></label>
          </div>
        </fieldset>

        <div class="transport">
          <button id="play-button" class="play-button" type="button">一時停止</button>
          <button id="restart-button" class="sub-button" type="button">最初から</button>
        </div>

        <label class="field range-field">
          <span><span>動作位置</span><output id="phase-output">0%</output></span>
          <input id="phase-range" type="range" min="0" max="100" value="0" />
        </label>

        <label class="field range-field">
          <span><span>再生速度</span><output id="speed-output">1.0×</output></span>
          <input id="speed-range" type="range" min="0.25" max="3" step="0.25" value="1" />
        </label>

        <div class="pose-note">
          <span>現在の定義</span>
          <code id="pose-code">rearReady</code>
          <p id="pose-description">低い重心と、ストロークへ移りやすい後衛の構え。</p>
        </div>
        <div class="tuning-panel">
          <div class="debug-heading">
            <span>PART TUNING</span>
            <label><input id="joint-axis-toggle" type="checkbox" checked /> XYZ矢印</label>
          </div>
          <label class="field compact-field">
            <span>調整対象</span>
            <select id="tune-part-select"></select>
          </label>
          <div class="tuning-target">
            <span>編集中</span>
            <code id="tune-pose-code">rearReady</code>
          </div>
          <div id="tune-controls" class="tune-controls"></div>
          <div class="tune-actions">
            <button id="tune-reset-button" class="sub-button" type="button">この部品を戻す</button>
            <button id="tune-copy-button" class="sub-button" type="button">値をコピー</button>
            <button id="export-json-button" class="sub-button" type="button">全JSONコピー</button>
            <button id="export-js-button" class="sub-button" type="button">全JSコピー</button>
          </div>
          <p id="export-status" class="export-status" aria-live="polite"></p>
        </div>
        <div class="debug-panel">
          <div class="debug-heading">
            <span>FORM CHECK</span>
            <label><input id="debug-axis-toggle" type="checkbox" checked /> 軸表示</label>
            <label><input id="side-marker-toggle" type="checkbox" checked /> 内外色</label>
          </div>
          <p class="axis-legend">
            <b class="axis-head">黄</b>ヘッド方向
            <b class="axis-face">水</b>面の向き
            <b class="axis-grip">黒</b>グリップ方向
            <b class="side-inner">水</b>体の内側
            <b class="side-outer">赤</b>体の外側
            <b class="side-knuckle">黄</b>手の甲側
          </p>
          <ul id="form-checklist" class="form-checklist"></ul>
          <dl id="form-metrics" class="form-metrics"></dl>
        </div>
      </aside>
    </div>
  </main>

  <script type="module" src="model-viewer.js"></script>
</body>
</html>
